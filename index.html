<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Daget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffd6e8 0%, #c9e4ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #8b5a8f;
            margin-bottom: 15px;
            font-size: 32px;
        }

        p {
            color: #a8a8a8;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 30px 0;
        }

        .number-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .number-btn:nth-child(1) {
            background: linear-gradient(135deg, #ffb3d9 0%, #ff99cc 100%);
        }

        .number-btn:nth-child(2) {
            background: linear-gradient(135deg, #b3d9ff 0%, #99ccff 100%);
        }

        .number-btn:nth-child(3) {
            background: linear-gradient(135deg, #ffd9b3 0%, #ffcc99 100%);
        }

        .number-btn:nth-child(4) {
            background: linear-gradient(135deg, #d9b3ff 0%, #cc99ff 100%);
        }

        .number-btn:nth-child(5) {
            background: linear-gradient(135deg, #b3ffcc 0%, #99ffcc 100%);
        }

        .number-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .number-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        #hasil {
            margin: 25px 0;
            font-size: 18px;
            color: #333;
            min-height: 40px;
        }

        .meta {
            margin-top: 25px;
            color: #999;
            font-size: 14px;
        }

        .meta div {
            margin: 8px 0;
        }

        #sisa {
            font-weight: bold;
            color: #ff6b9d;
        }

        a.dana-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #ffb3d9 0%, #ff99cc 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        a.dana-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 99, 184, 0.3);
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #ccc;
        }

        .link {
            color: #ffb3d9;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎮 Tebak Dimana Daget Berada</h2>
        <p>Pilih angka 1 - 5 (3 kesempatan)</p>

        <div class="numbers-grid">
            <button class="number-btn" onclick="cek(1)">1</button>
            <button class="number-btn" onclick="cek(2)">2</button>
            <button class="number-btn" onclick="cek(3)">3</button>
            <button class="number-btn" onclick="cek(4)">4</button>
            <button class="number-btn" onclick="cek(5)">5</button>
        </div>

        <p id="hasil">Silakan pilih angka untuk memulai</p>

        <div class="meta">
            <div>Sisa kesempatan: <span id="sisa">3</span></div>
            <div>Rentang: 1 — 5</div>
        </div>

        <footer>
            <span>Source & demo:</span>
            <a class="link" id="repoLink" href="#" target="_blank" rel="noopener">GitHub repo</a>
        </footer>
    </div>

    <script>
        let kesempatan = 3;
        let angkaBenar = 3;
        let mainButtons = document.querySelectorAll('.number-btn');

        function cek(angka) {
            if (! mainButtons[angka - 1].disabled) {
                mainButtons[angka - 1].disabled = true;

                if (angka == angkaBenar) {
                    document.getElementById("hasil").innerHTML =
                        "🥳 BENAR!<br><br>👉 <a class='dana-link' href='https://link.dana.id/danakaget?c=s53py4xkn&r=jJBoSu&orderId=20260323101214025815010300166685870889326' target='_blank'>AMBIL DAGET DI SINI</a>";
                    disableAllButtons();
                } else {
                    kesempatan--;

                    if (kesempatan > 0) {
                        let clue = angka < angkaBenar ? "🔼 Lebih besar!" : "🔽 Lebih kecil!";
                        document.getElementById("hasil").innerHTML =
                            "❌ Salah!<br>" + clue + "<br>Sisa kesempatan: " + kesempatan;
                        document.getElementById("sisa").textContent = kesempatan;
                    } else {
                        document.getElementById("hasil").innerHTML =
                            "💀 Kesempatan habis! Jawaban: " + angkaBenar;
                        disableAllButtons();
                    }
                }
            }
        }

        function disableAllButtons() {
            mainButtons.forEach(btn => btn.disabled = true);
        }
    </script>
</body>
</html>
